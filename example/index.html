<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Illustrator URL Handler Example</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      .icon-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: min(50vw, 50vh);
        height: min(50vw, 50vh);
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #ffffff;
        text-decoration: none;
      }

      .icon-link img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 24px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <a
      id="alpacaLink"
      class="icon-link"
      href="#"
      title="Open alpaca.svg in Illustrator"
    >
      <img src="../assets/alpaca.svg" alt="Alpaca icon" />
    </a>

    <script>
      (function () {
        const link = document.getElementById("alpacaLink");
        const url = new URL(window.location.href);
        const htmlPath = decodeURIComponent(url.pathname);
        const iconPath = htmlPath.replace(
          /\/example\/index\.html$/,
          "/assets/alpaca.svg",
        );
        link.href = `illustrator-open://open?path=${encodeURIComponent(iconPath)}`;
      })();
    </script>
  </body>
</html>
